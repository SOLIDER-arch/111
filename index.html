<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladies of Marshall - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background-color: #cfe0ee;
            background-image: url("background.png");
            background-size: contain;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 20px 4vw 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            width: 380px;
            max-width: 100%;
            padding: 24px 26px 24px;
            border-radius: 14px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
        }

        .ornament {
            text-align: center;
            color: #b8860b;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .title-row img {
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
        }

        .title-row h1 {
            margin: 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: #1a3763;
            font-size: 19px;
            letter-spacing: 0.5px;
            margin: 0 0 4px;
        }

        .subtitle {
            text-align: center;
            color: #b8860b;
            letter-spacing: 1px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .divider {
            text-align: center;
            color: #b8860b;
            font-size: 11px;
            margin-bottom: 12px;
            letter-spacing: 3px;
        }

        .event-info {
            text-align: center;
            margin-bottom: 18px;
        }

        .event-info .title {
            font-family: 'Playfair Display', serif;
            color: #1a3763;
            font-weight: 700;
            font-size: 13px;
            display: block;
        }

        .event-info .dates {
            color: #1a3763;
            font-size: 11px;
        }

        .field {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
        }

        .field .icon {
            flex: 0 0 16px;
            margin-top: 24px;
            color: #1a3763;
        }

        .field .icon svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        .field-body {
            flex: 1;
            min-width: 0;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1a2c40;
            margin-bottom: 4px;
            font-size: 11px;
            font-family: 'EB Garamond', Georgia, serif;
        }

        input, select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 7px;
            border: 1px solid #c9ccd1;
            font-size: 12px;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1a3763;
        }

        button {
            width: 100%;
            padding: 11px;
            border-radius: 9px;
            border: none;
            background: #1a3763;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
        }

        button:hover {
            background: #12294a;
        }

        button svg {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 700px) {
            body {
                justify-content: center;
                padding: 20px;
            }
            .card {
                width: 100%;
                padding: 30px 24px 28px;
            }
        }
    </style>
</head>
